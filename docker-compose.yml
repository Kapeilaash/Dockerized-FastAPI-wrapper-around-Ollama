version: "3.8"

services:
  fastapi:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      # Talk to Ollama container from inside docker network
      - OLLAMA_URL=http://ollama:11434/api/generate

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: